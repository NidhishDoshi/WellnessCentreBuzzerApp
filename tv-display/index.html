<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Centre - Nurse Station Display</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🏥 Wellness Centre - Nurse Station</h1>
            <div class="header-info">
                <div id="connection-status" class="status disconnected">
                    <span class="status-dot"></span>
                    <span class="status-text">Disconnected</span>
                </div>
                <div class="datetime" id="datetime"></div>
            </div>
        </header>

        <main class="main-content">
            <div class="calls-section">
                <div class="section-header">
                    <h2>Active Calls</h2>
                    <span class="call-count" id="call-count">0</span>
                </div>
                
                <div id="calls-container" class="calls-container">
                    <div class="empty-state">
                        <div class="empty-icon">✓</div>
                        <h3>No Active Calls</h3>
                        <p>Waiting for doctor requests...</p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>Nurse Station Display - Always On</p>
        </footer>
    </div>

    <!-- Audio for notification -->
    <audio id="notification-sound" preload="auto">
        <source src="notification.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
